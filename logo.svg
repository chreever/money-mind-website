<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="glowNet">
            <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <g filter="url(#glowNet)">
        <polygon points="50,20 75,35 75,65 50,80 25,65 25,35" fill="none" stroke="#8b5cf6" stroke-width="3" stroke-linejoin="round"/>
        <line x1="25" y1="35" x2="75" y2="65" stroke="#10b981" stroke-width="2" opacity="0.7"/>
        <line x1="25" y1="65" x2="75" y2="35" stroke="#10b981" stroke-width="2" opacity="0.7"/>
        <line x1="50" y1="20" x2="50" y2="80" stroke="#10b981" stroke-width="2" opacity="0.7"/>
        <circle cx="50" cy="50" r="7" fill="#10b981" />
        <circle cx="25" cy="35" r="4" fill="#8b5cf6" />
        <circle cx="75" cy="35" r="4" fill="#8b5cf6" />
        <circle cx="25" cy="65" r="4" fill="#8b5cf6" />
        <circle cx="75" cy="65" r="4" fill="#8b5cf6" />
        <circle cx="50" cy="20" r="4" fill="#8b5cf6" />
        <circle cx="50" cy="80" r="4" fill="#8b5cf6" />
    </g>
</svg>
